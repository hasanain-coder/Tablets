<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أداة تثقيف المريض الدوائي | Clinical Pharmacy Counseling</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@300;400;500;600;700&family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#FAF8F3;--bg-alt:#F5F2EB;--fg:#1C1917;--fg-sec:#44403C;--muted:#78716C;--muted-lt:#A8A29E;
            --accent:#14532D;--accent-mid:#166534;--accent-lt:#22C55E;--gold:#B8860B;--gold-lt:#DAA520;
            --card:#FFFFFF;--border:#E7E5E0;--surface:#F0EDE6;--danger:#991B1B;
        }
        body.dark-mode {
            --bg:#0C0F0A;--bg-alt:#11140E;--fg:#E7E5E0;--fg-sec:#D6D3CE;--muted:#A8A29E;--muted-lt:#78716C;
            --accent:#22C55E;--accent-mid:#16A34A;--accent-lt:#4ADE80;--gold:#DAA520;--gold-lt:#F59E0B;
            --card:#1A1D16;--border:#2E3228;--surface:#14170F;--danger:#F87171;
        }
        *{font-family:'DM Sans','Cairo',sans-serif;text-rendering:optimizeLegibility;-webkit-font-smoothing:antialiased;box-sizing:border-box;}
        .font-display{font-family:'Playfair Display',serif;}
        .font-arabic{font-family:'Cairo',sans-serif;}
        body{background:var(--bg);color:var(--fg);transition:background .4s,color .4s;min-height:100vh;}
        body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 0%,rgba(20,83,45,.06) 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(184,134,11,.04) 0%,transparent 50%);pointer-events:none;z-index:0;}
        body.dark-mode::before{background:radial-gradient(ellipse at 20% 0%,rgba(34,197,94,.04) 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(218,165,32,.03) 0%,transparent 50%);}
        ::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--accent);border-radius:3px;}
        @keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
        @keyframes slideRight{from{opacity:0;transform:translateX(-16px);}to{opacity:1;transform:translateX(0);}}
        @keyframes pulseGlow{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.3);}50%{box-shadow:0 0 20px 4px rgba(34,197,94,.15);}}
        @keyframes shimmer{0%{background-position:-200% 0;}100%{background-position:200% 0;}}
        @keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(10px);}to{opacity:1;transform:scale(1) translateY(0);}}
        .anim-fade-up{animation:fadeUp .6s cubic-bezier(.22,1,.36,1) forwards;}
        .anim-slide-right{animation:slideRight .5s cubic-bezier(.22,1,.36,1) forwards;}
        .anim-modal{animation:modalIn .3s cubic-bezier(.22,1,.36,1) forwards;}
        input,select,textarea{background:var(--surface);color:var(--fg);border:1.5px solid var(--border);transition:all .25s;font-size:14px;}
        input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(20,83,45,.1);background:var(--card);}
        body.dark-mode input,body.dark-mode select,body.dark-mode textarea{color:#E7E5E0!important;caret-color:#E7E5E0;}
        input:-webkit-autofill,input:-webkit-autofill:focus{-webkit-box-shadow:0 0 0 30px var(--surface) inset!important;-webkit-text-fill-color:var(--fg)!important;}
        body.dark-mode input:-webkit-autofill{-webkit-text-fill-color:#E7E5E0!important;}
        .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent-mid));color:#fff;transition:all .3s;position:relative;overflow:hidden;}
        .btn-primary::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);background-size:200% 100%;animation:shimmer 3s ease infinite;}
        .btn-primary:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 24px rgba(20,83,45,.25);}
        .btn-primary:disabled{opacity:.4;cursor:not-allowed;}
        .btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-lt));color:#fff;transition:all .3s;}
        .btn-gold:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 24px rgba(184,134,11,.25);}
        .btn-gold:disabled{opacity:.4;cursor:not-allowed;}
        .btn-update{background:linear-gradient(135deg,#6D28D9,#7C3AED)!important;}
        .btn-update:hover:not(:disabled){box-shadow:0 8px 24px rgba(109,40,217,.25)!important;}
        .card{background:var(--card);border:1px solid var(--border);border-radius:16px;transition:all .3s;}
        .card:hover{box-shadow:0 12px 40px rgba(0,0,0,.06);}
        body.dark-mode .card:hover{box-shadow:0 12px 40px rgba(0,0,0,.3);}
        .live-dot{width:7px;height:7px;border-radius:50%;background:#22C55E;display:inline-block;animation:pulseGlow 2s ease infinite;}
        .live-dot.offline{background:#EF4444;animation:none;}
        .instruction-preview{background:linear-gradient(135deg,rgba(20,83,45,.06),rgba(184,134,11,.04));border:1.5px solid rgba(20,83,45,.15);border-radius:12px;padding:16px;direction:rtl;text-align:right;}
        body.dark-mode .instruction-preview{background:linear-gradient(135deg,rgba(34,197,94,.08),rgba(218,165,32,.05));border-color:rgba(34,197,94,.2);}

        /* =============================================
           PDF Styles
           ============================================= */
        #pdf-render-container{position:absolute;left:-9999px;top:0;z-index:-1000;opacity:0;pointer-events:none;}
        .pdf-page{width:210mm;height:297mm;padding:10mm 12mm;background:#fff;box-sizing:border-box;font-family:'Cairo',sans-serif;direction:rtl;color:#000;display:flex;flex-direction:column;}
        .pdf-title{text-align:center;font-size:15pt;font-weight:800;color:#14532D;margin-bottom:1.5mm;flex-shrink:0;}
        .pdf-subtitle{text-align:center;font-size:8.5pt;color:#888;margin-bottom:5mm;flex-shrink:0;}
        .pdf-info-row{display:flex;gap:3mm;margin-bottom:4mm;direction:rtl;flex-shrink:0;}
        .pdf-info-item{flex:1;border:1.5px solid #333;border-radius:3px;padding:2.5mm 3mm;font-size:9.5pt;display:flex;align-items:center;justify-content:center;text-align:center;gap:1.5mm;}
        .pdf-info-label{font-weight:700;color:#14532D;white-space:nowrap;}
        .pdf-info-value{font-weight:700;color:#000;}
        .pdf-table-wrap{flex:1;display:flex;flex-direction:column;min-height:0;border:1.5px solid #0A2E18;}
        .pdf-thead{display:grid;grid-template-columns:14% 22% 18% 46%;flex-shrink:0;}
        .pdf-th{background:#14532D;color:#fff;padding:2.5mm 2mm;font-weight:700;font-size:9.5pt;text-align:center;border-left:1.5px solid #0A2E18;border-bottom:1.5px solid #0A2E18;display:flex;align-items:center;justify-content:center;}
        .pdf-th:last-child{border-left:none;}
        .pdf-tbody{flex:1;display:grid;grid-template-rows:repeat(9,1fr);}
        .pdf-row{display:grid;grid-template-columns:14% 22% 18% 46%;border-bottom:1px solid #999;}
        .pdf-row:nth-child(even) .pdf-cell{background:#FAFAF7;}
        .pdf-row:last-child{border-bottom:none;}
        .pdf-cell{border-left:1px solid #999;padding:1.5mm 2mm;display:flex;align-items:center;justify-content:center;font-size:9pt;overflow:hidden;}
        .pdf-cell:last-child{border-left:none;}
        .cell-name{font-weight:700;text-align:center;direction:ltr;}
        .cell-dose{font-weight:700;text-align:center;direction:ltr;}
        .cell-instr{align-items:flex-start;justify-content:flex-start;text-align:right;direction:rtl;font-weight:600;line-height:1.6;font-size:8.5pt;padding:1.5mm 2.5mm;}
        .instr-main{font-weight:800;font-size:9pt;}
        .instr-timing{color:#14532D;font-weight:700;font-size:8pt;margin-top:.5mm;}
        .instr-warning{color:#B91C1C;font-weight:700;font-size:7.5pt;margin-top:.3mm;}
        .pdf-footer{flex-shrink:0;margin-top:3mm;padding-top:2.5mm;border-top:1.5px solid #333;direction:ltr;display:flex;justify-content:space-between;align-items:flex-end;}
        .pdf-sig-block{text-align:left;}
        .pdf-sig-label{font-size:10.5pt;font-weight:800;color:#14532D;direction:rtl;display:inline-block;}
        .pdf-sig-line{border-bottom:1.5px solid #333;width:65mm;margin-top:1.5mm;height:14mm;}
        .pdf-watermark{text-align:right;direction:ltr;font-size:6.5pt;color:#ccc;}

        /* =============================================
           Toast
           ============================================= */
        #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);padding:12px 28px;border-radius:14px;font-weight:600;font-size:14px;z-index:10000;opacity:0;transition:all .35s cubic-bezier(.22,1,.36,1);pointer-events:none;font-family:'Cairo',sans-serif;direction:rtl;}
        #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

        /* =============================================
           Patient Cards Stagger
           ============================================= */
        .patient-card{opacity:0;animation:fadeUp .5s cubic-bezier(.22,1,.36,1) forwards;}
        .patient-card:nth-child(1){animation-delay:0s;}.patient-card:nth-child(2){animation-delay:.06s;}.patient-card:nth-child(3){animation-delay:.12s;}.patient-card:nth-child(4){animation-delay:.18s;}.patient-card:nth-child(5){animation-delay:.24s;}.patient-card:nth-child(6){animation-delay:.3s;}

        /* =============================================
           Print Modal — display:none by default
           ============================================= */
        .modal-overlay{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;padding:16px;}
        .modal-overlay.modal-active{display:flex;}
        .modal-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);}
        .modal-content{position:relative;background:var(--card);border:1px solid var(--border);border-radius:20px;width:100%;max-width:520px;max-height:80vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 25px 60px rgba(0,0,0,.2);}

        @media(max-width:640px){.med-grid{grid-template-columns:1fr!important;}.modal-content{max-height:90vh;}}
        @media print{body *{display:none!important;}}
        @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important;}}
    </style>
</head>
<body>
    <div id="mainApp" style="position:relative;z-index:1;">
        <header class="sticky top-0 z-50 border-b border-[var(--border)]" style="background:rgba(250,248,243,.92);backdrop-filter:blur(16px);">
            <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-11 h-11 rounded-xl bg-gradient-to-br from-[var(--accent)] to-[var(--accent-mid)] flex items-center justify-center shadow-lg shadow-[var(--accent)]/20">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/></svg>
                    </div>
                    <div>
                        <h1 class="text-lg md:text-xl font-bold text-[var(--fg)] font-display tracking-tight">Medication Counseling</h1>
                        <p class="text-xs text-[var(--muted)] font-arabic">أداة تثقيف المريض الدوائي</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <div class="flex items-center gap-1.5 px-3 py-1.5 rounded-full border border-[var(--border)]" style="background:var(--surface);"><span id="connDot" class="live-dot"></span><span id="connText" class="text-xs font-semibold text-[var(--muted)]">متصل</span></div>
                    <button id="darkToggle" class="w-10 h-10 rounded-xl border border-[var(--border)] flex items-center justify-center hover:border-[var(--accent)] transition-all" style="background:var(--surface);" aria-label="تبديل الوضع الليلي">
                        <svg id="iconMoon" class="w-5 h-5 text-[var(--fg)]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                        <svg id="iconSun" class="w-5 h-5 text-[var(--fg)] hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                    </button>
                    <div id="counterBadge" class="hidden px-3 py-1.5 rounded-full text-xs font-bold" style="background:rgba(20,83,45,.1);color:var(--accent);border:1px solid rgba(20,83,45,.15);"><span id="counterText">0</span></div>
                </div>
            </div>
        </header>

        <main class="max-w-6xl mx-auto px-4 py-6 space-y-6">
            <section class="card overflow-hidden anim-fade-up">
                <div class="px-6 py-4" style="background:linear-gradient(135deg,var(--accent),var(--accent-mid));"><h2 class="text-lg text-white font-bold font-arabic">بيانات المريض</h2><p class="text-white/60 text-xs mt-0.5">Patient Identification</p></div>
                <div class="p-6">
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                        <div class="space-y-2"><label class="block text-sm font-semibold text-[var(--fg)] font-arabic">اسم المريض</label><input type="text" id="inpName" class="w-full px-4 py-3 rounded-xl" placeholder="أدخل اسم المريض"></div>
                        <div class="space-y-2"><label class="block text-sm font-semibold text-[var(--fg)] font-arabic">رقم الغرفة</label><input type="text" id="inpRoom" class="w-full px-4 py-3 rounded-xl" placeholder="مثال: 204"></div>
                        <div class="space-y-2"><label class="block text-sm font-semibold text-[var(--fg)] font-arabic">رقم السرير</label><input type="text" id="inpBed" class="w-full px-4 py-3 rounded-xl" placeholder="مثال: 3"></div>
                    </div>
                </div>
            </section>

            <section class="card overflow-hidden anim-fade-up" style="animation-delay:.1s;">
                <div class="px-6 py-4 flex items-center gap-3" style="background:linear-gradient(135deg,var(--gold),var(--gold-lt));">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
                    <div><h2 class="text-lg text-white font-bold font-arabic">إضافة دواء</h2><p class="text-white/60 text-xs">Add Medication Entry</p></div>
                </div>
                <div class="p-6 space-y-5">
                    <div class="med-grid grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                        <div class="space-y-2"><label class="block text-sm font-semibold text-[var(--fg)] font-arabic">التصنيف</label><select id="selCategory" class="w-full px-4 py-3 rounded-xl"><option value="">-- اختر التصنيف --</option><option value="cardiac">قلبية (Cardiac)</option><option value="antibiotics">مضادات حيوية (Antibiotics)</option><option value="others">أخرى (Others)</option></select></div>
                        <div class="space-y-2"><label class="block text-sm font-semibold text-[var(--fg)] font-arabic">اسم الدواء</label><select id="selDrug" class="w-full px-4 py-3 rounded-xl" disabled><option value="">-- اختر التصنيف أولاً --</option></select><input type="text" id="inpCustomDrug" class="hidden w-full px-4 py-3 rounded-xl" placeholder="اسم الدواء (يدوي)"></div>
                        <div class="space-y-2"><label class="block text-sm font-semibold text-[var(--fg)] font-arabic">الجرعة</label><input type="text" id="inpDose" class="w-full px-4 py-3 rounded-xl" placeholder="مثال: 75mg"></div>
                        <div class="space-y-2"><label class="block text-sm font-semibold text-[var(--fg)] font-arabic">عدد الحبات / الجرعة</label><select id="selPills" class="w-full px-4 py-3 rounded-xl"><option value="1">1 حبة</option><option value="2">2 حبات</option><option value="3">3 حبات</option><option value="4">4 حبات</option><option value="5">5 حبات</option></select></div>
                    </div>
                    <div class="med-grid grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                        <div class="space-y-2"><label class="block text-sm font-semibold text-[var(--fg)] font-arabic">التكرار</label><select id="selFreq" class="w-full px-4 py-3 rounded-xl"><option value="1">مرة واحدة يومياً</option><option value="2">مرتين يومياً</option><option value="3">ثلاث مرات يومياً</option><option value="4">أربع مرات يومياً</option></select></div>
                        <div class="space-y-2"><label class="block text-sm font-semibold text-[var(--fg)] font-arabic">وقت الإعطاء</label><select id="selTiming" class="w-full px-4 py-3 rounded-xl"><option value="">-- اختر الوقت --</option><option value="١٢ ليلاً">١٢ ليلاً</option><option value="١٢ ظهراً">١٢ ظهراً</option><option value="٨ صباحاً">٨ صباحاً</option><option value="٨ صباحاً و٤ عصراً">٨ صباحاً و٤ عصراً</option></select></div>
                        <div class="space-y-2"><label class="block text-sm font-semibold text-[var(--fg)] font-arabic">طريقة الإعطاء</label><select id="selMethod" class="w-full px-4 py-3 rounded-xl"><option value="after">بعد الطعام</option><option value="before">قبل الطعام</option></select></div>
                        <div class="space-y-2"><label class="block text-sm font-semibold text-[var(--fg)] font-arabic">ملاحظات تحذيرية</label><select id="selWarning" class="w-full px-4 py-3 rounded-xl"><option value="">بدون</option><option value="milk">لا تؤخذ مع الحليب</option><option value="drowsy">تسبب النعاس</option><option value="water">اشرب كميات كافية من الماء</option><option value="crush">لا تسحق القرص</option></select></div>
                    </div>
                    <div id="previewBox" class="instruction-preview hidden">
                        <div class="flex items-start gap-2">
                            <svg class="w-5 h-5 mt-0.5 flex-shrink-0" style="color:var(--accent);" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                            <div><p class="text-xs font-bold mb-1" style="color:var(--accent);">معاينة التعليمات:</p><p id="previewText" class="font-arabic font-bold text-base leading-relaxed" style="color:var(--fg);">—</p><p id="previewTiming" class="hidden font-arabic text-sm font-semibold mt-1" style="color:var(--gold);"></p><p id="previewWarning" class="hidden font-arabic text-sm font-bold mt-1" style="color:var(--danger);"></p></div>
                        </div>
                    </div>
                    <button id="btnAddMed" class="btn-primary w-full py-3.5 rounded-xl font-bold text-base flex items-center justify-center gap-2 font-arabic" disabled>
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg>إضافة الدواء للقائمة
                    </button>
                </div>
            </section>

            <section id="currentMedsSection" class="card overflow-hidden hidden anim-fade-up" style="animation-delay:.15s;">
                <div class="px-6 py-3 flex items-center justify-between" style="background:var(--surface);border-bottom:1px solid var(--border);">
                    <h3 class="font-bold text-[var(--fg)] font-arabic text-sm">الأدوية المضافة (<span id="medCount">0</span>)</h3>
                    <button id="btnClearMeds" class="text-xs font-semibold px-3 py-1.5 rounded-lg hover:bg-red-50 transition-colors" style="color:var(--danger);">مسح الكل</button>
                </div>
                <div id="medsList" class="p-4 space-y-2 max-h-[300px] overflow-y-auto"></div>
                <div class="p-4 pt-0">
                    <button id="btnSave" class="btn-gold w-full py-4 rounded-xl font-bold text-lg font-arabic flex items-center justify-center gap-2">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg><span id="btnSaveText">حفظ المريض في الطابور</span>
                    </button>
                    <button id="btnCancelEdit" class="hidden w-full py-2.5 rounded-xl border text-sm font-semibold font-arabic mt-2 transition-colors hover:bg-red-50" style="border-color:rgba(153,27,27,.2);color:var(--danger);">إلغاء التعديل</button>
                </div>
            </section>

            <section class="space-y-4 anim-fade-up" style="animation-delay:.2s;">
                <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
                    <h2 class="text-xl font-bold text-[var(--fg)] font-display">Patient Queue</h2>
                    <div class="flex items-center gap-2 flex-wrap">
                        <div class="relative"><svg class="w-4 h-4 absolute right-3 top-1/2 -translate-y-1/2 text-[var(--muted)]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg><input type="text" id="filterRoom" class="pr-9 pl-4 py-2 rounded-xl text-sm w-40" placeholder="فلتر بالغرفة..." dir="ltr" style="text-align:left;"></div>
                    </div>
                </div>
                <div class="flex gap-2 flex-wrap">
                    <button id="btnOpenPrintModal" class="btn-primary px-5 py-2.5 rounded-xl font-semibold text-sm flex items-center gap-2 font-arabic">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>طباعة (اختيار ذكي)
                    </button>
                    <button id="btnClearQueue" class="px-5 py-2.5 rounded-xl border text-sm font-medium flex items-center gap-2 transition-colors hover:bg-red-50" style="border-color:rgba(153,27,27,.2);color:var(--danger);">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>مسح الطابور
                    </button>
                </div>
                <div id="queueGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4"></div>
                <div id="emptyState" class="text-center py-16 card">
                    <div class="w-20 h-20 mx-auto mb-4 rounded-2xl flex items-center justify-center" style="background:var(--surface);"><svg class="w-10 h-10 text-[var(--muted)]" style="opacity:.3;" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg></div>
                    <p class="text-[var(--muted)] font-semibold font-arabic">لا يوجد مرضى في الطابور</p>
                    <p class="text-[var(--muted)] text-sm mt-1 opacity-60 font-arabic">أضف بيانات المريض أعلاه للبدء</p>
                </div>
            </section>
        </main>
    </div>

    <!-- Print Modal — NO hidden attribute, CSS handles visibility -->
    <div id="printModal" class="modal-overlay">
        <div class="modal-backdrop" onclick="window._closePrintModal()"></div>
        <div class="modal-content anim-modal">
            <div class="px-6 py-4 flex items-center justify-between" style="background:linear-gradient(135deg,var(--accent),var(--accent-mid));">
                <h2 class="text-lg text-white font-bold font-arabic">اختيار المرضى للطباعة</h2>
                <button onclick="window._closePrintModal()" class="w-8 h-8 rounded-lg flex items-center justify-center hover:bg-white/20 transition-colors">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <div class="p-4 space-y-3" style="border-bottom:1px solid var(--border);">
                <div class="relative">
                    <svg class="w-4 h-4 absolute right-3 top-1/2 -translate-y-1/2 text-[var(--muted)]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    <input type="text" id="modalSearch" inputmode="numeric" class="w-full pr-9 pl-4 py-3 rounded-xl text-base" placeholder="بحث بالغرفة (٥ أو 5)..." dir="ltr" style="text-align:left;">
                </div>
                <label class="flex items-center gap-2 cursor-pointer text-sm font-semibold text-[var(--fg)] px-1">
                    <input type="checkbox" id="modalSelAll" class="w-4 h-4 rounded accent-[var(--accent)]">
                    تحديد الكل
                </label>
            </div>
            <div id="modalPatientList" class="flex-1 overflow-y-auto p-4 space-y-2" style="min-height:120px;max-height:400px;"></div>
            <div class="p-4" style="border-top:1px solid var(--border);background:var(--surface);">
                <div class="flex items-center justify-between mb-3">
                    <span class="text-sm font-semibold text-[var(--muted)] font-arabic">المحدد: <span id="modalSelCount" class="text-[var(--accent)] font-bold">0</span></span>
                </div>
                <button id="btnModalPrint" disabled class="btn-primary w-full py-3.5 rounded-xl font-bold text-base flex items-center justify-center gap-2 font-arabic">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>إنشاء PDF
                </button>
            </div>
        </div>
    </div>

    <div id="pdf-render-container"></div>
    <div id="toast"><span id="toastMsg"></span></div>

    <script type="module">
        const firebaseConfig={apiKey:"AIzaSyAaMqxvBAuTkOykYHF5w_xjS98bDOhZoPY",authDomain:"documentation2-dd1aa.firebaseapp.com",projectId:"documentation2-dd1aa",storageBucket:"documentation2-dd1aa.firebasestorage.app",messagingSenderId:"236681783643",appId:"1:236681783643:web:dc4d715258955b3413d27e",measurementId:"G-WRK2C3121X"};
        import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import{getFirestore,collection,addDoc,updateDoc,deleteDoc,doc,onSnapshot,query,orderBy}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        const app=initializeApp(firebaseConfig);
        const db=getFirestore(app);
        const patientsRef=collection(db,"counseling_patients");

        const DRUG_DB={
            cardiac:[{name:'Aspirin',defaultDose:'75mg'},{name:'Plavix (Clopidogrel)',defaultDose:'75mg'},{name:'Atorvastatin',defaultDose:'20mg'},{name:'Bisoprolol',defaultDose:'5mg'}],
            antibiotics:[{name:'Amoxicillin',defaultDose:'500mg'},{name:'Augmentin',defaultDose:'625mg'},{name:'Azithromycin',defaultDose:'500mg'}],
            others:[]
        };
        const PILLS_ARABIC={1:'حبة واحدة',2:'حبتين',3:'ثلاث حبات',4:'أربع حبات',5:'خمس حبات'};
        const FREQ_ARABIC={1:'مرة واحدة',2:'مرتين',3:'ثلاث مرات',4:'أربع مرات'};
        const METHOD_ARABIC={before:'قبل الطعام',after:'بعد الطعام'};
        const WARNING_ARABIC={milk:'لا تؤخذ مع الحليب',drowsy:'تسبب النعاس',water:'اشرب كميات كافية من الماء',crush:'لا تسحق القرص'};

        let patients=[];
        let currentMeds=[];
        let modalSelectedIds=new Set();
        let editingPatientId=null;
        const $=id=>document.getElementById(id);

        const ARABIC_DIGITS='٠١٢٣٤٥٦٧٨٩';
        const ENGLISH_DIGITS='0123456789';

        function normalizeDigits(str){
            if(!str)return'';
            let r='';
            for(let i=0;i<str.length;i++){
                const ai=ARABIC_DIGITS.indexOf(str[i]);
                const ei=ENGLISH_DIGITS.indexOf(str[i]);
                if(ai!==-1)r+=ENGLISH_DIGITS[ai];
                else if(ei!==-1)r+=ARABIC_DIGITS[ei];
                else r+=str[i];
            }
            return r;
        }

        function toEnglishNums(str){
            if(!str)return'';
            let r='';
            for(let i=0;i<str.length;i++){
                const ai=ARABIC_DIGITS.indexOf(str[i]);
                if(ai!==-1)r+=ENGLISH_DIGITS[ai];
                else r+=str[i];
            }
            return r;
        }

        function generateArabicInstruction(pills,method,freq){
            const p=PILLS_ARABIC[pills]||`${pills} حبات`;
            const m=METHOD_ARABIC[method]||'';
            const f=FREQ_ARABIC[freq]||`${freq} مرات`;
            return`تؤخذ ${p} ${m} ${f} يومياً`;
        }
        function generateId(){return Date.now().toString(36)+Math.random().toString(36).substr(2,8);}
        function showToast(msg,type='success'){
            const c={success:'background:#14532D;color:white;',error:'background:#991B1B;color:white;',info:'background:#1C1917;color:white;'};
            const t=$('toast');$('toastMsg').textContent=msg;t.style.cssText+=c[type]||c.info;t.classList.add('show');
            setTimeout(()=>t.classList.remove('show'),3000);
        }
        function setConnection(online){$('connDot').classList.toggle('offline',!online);$('connText').textContent=online?'متصل':'غير متصل';}

        function initDarkMode(){
            const d=localStorage.getItem('counseling_theme')==='dark';
            document.body.classList.toggle('dark-mode',d);$('iconMoon').classList.toggle('hidden',d);$('iconSun').classList.toggle('hidden',!d);
        }
        $('darkToggle').addEventListener('click',()=>{
            const d=document.body.classList.toggle('dark-mode');localStorage.setItem('counseling_theme',d?'dark':'light');
            $('iconMoon').classList.toggle('hidden',d);$('iconSun').classList.toggle('hidden',!d);
        });

        function updateDrugDropdown(){
            const cat=$('selCategory').value,sel=$('selDrug'),custom=$('inpCustomDrug');
            sel.innerHTML='';custom.classList.add('hidden');sel.disabled=true;
            if(!cat){sel.innerHTML='<option value="">-- اختر التصنيف أولاً --</option>';return;}
            sel.disabled=false;
            if(cat==='others'){custom.classList.remove('hidden');sel.innerHTML='<option value="custom">إدخال يدوي</option>';return;}
            const drugs=DRUG_DB[cat]||[];
            sel.innerHTML='<option value="">-- اختر الدواء --</option>'+drugs.map(d=>`<option value="${d.name}" data-dose="${d.defaultDose}">${d.name}</option>`).join('');
        }
        function onDrugSelected(){
            const v=$('selDrug').value;
            if(v&&v!=='custom')$('inpDose').value=$('selDrug').selectedOptions[0].dataset.dose||'';
            else if(v!=='custom')$('inpDose').value='';
            updatePreview();
        }
        function updatePreview(){
            const pills=parseInt($('selPills').value)||1,method=$('selMethod').value,freq=parseInt($('selFreq').value)||1;
            const warning=$('selWarning').value,timing=$('selTiming').value;
            $('previewText').textContent=generateArabicInstruction(pills,method,freq);
            $('previewBox').classList.remove('hidden');
            if(timing){$('previewTiming').textContent='الوقت: '+timing;$('previewTiming').classList.remove('hidden');}
            else $('previewTiming').classList.add('hidden');
            if(warning&&WARNING_ARABIC[warning]){$('previewWarning').textContent='تنبيه: '+WARNING_ARABIC[warning];$('previewWarning').classList.remove('hidden');}
            else $('previewWarning').classList.add('hidden');
            const cat=$('selCategory').value,dv=$('selDrug').value,cn=cat==='others'?$('inpCustomDrug').value.trim():'';
            $('btnAddMed').disabled=!(cat&&((dv&&dv!=='custom')||(dv==='custom'&&cn))&&$('inpDose').value.trim());
        }

        function addMedication(){
            const cat=$('selCategory').value,dv=$('selDrug').value;
            let drugName=dv==='custom'?$('inpCustomDrug').value.trim():dv;
            const dose=$('inpDose').value.trim(),pills=parseInt($('selPills').value)||1,freq=parseInt($('selFreq').value)||1;
            const timing=$('selTiming').value,method=$('selMethod').value,warning=$('selWarning').value;
            if(!drugName||!dose){showToast('أكمل بيانات الدواء','error');return;}
            if(currentMeds.some(m=>m.drugName.toLowerCase()===drugName.toLowerCase())){showToast('هذا الدواء مضاف مسبقاً','error');return;}
            currentMeds.push({id:generateId(),category:cat,drugName,dose,pills,freq,timing,method,warning,
                instruction:generateArabicInstruction(pills,method,freq),warningText:warning?WARNING_ARABIC[warning]:''});
            renderMedsList();showToast('تمت إضافة الدواء');
            $('selDrug').value=cat==='others'?'custom':'';$('inpDose').value='';
            if(cat==='others')$('inpCustomDrug').value='';$('selTiming').value='';$('selWarning').value='';
            $('previewBox').classList.add('hidden');$('btnAddMed').disabled=true;
        }
        function removeMed(i){currentMeds.splice(i,1);renderMedsList();}
        window._removeMed=removeMed;

        function renderMedsList(){
            const s=$('currentMedsSection'),l=$('medsList');
            if(!currentMeds.length){s.classList.add('hidden');return;}
            s.classList.remove('hidden');$('medCount').textContent=currentMeds.length;
            l.innerHTML=currentMeds.map((m,i)=>`
                <div class="anim-slide-right flex items-start justify-between gap-3 p-3 rounded-xl" style="background:var(--surface);border:1px solid var(--border);animation-delay:${i*.05}s;">
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2 flex-wrap">
                            <span class="font-bold text-[var(--fg)] text-sm">${m.drugName}</span>
                            <span class="px-2 py-0.5 rounded-full text-xs font-semibold" style="background:rgba(20,83,45,.08);color:var(--accent);">${m.dose} X ${m.freq}</span>
                            ${m.timing?`<span class="text-xs font-semibold" style="color:var(--gold);">${m.timing}</span>`:''}
                        </div>
                        <p class="font-arabic text-sm font-bold mt-1" style="color:var(--fg);">${m.instruction}</p>
                        ${m.warningText?`<p class="font-arabic text-xs font-bold mt-0.5" style="color:var(--danger);">${m.warningText}</p>`:''}
                    </div>
                    <button onclick="window._removeMed(${i})" class="p-1.5 rounded-lg hover:bg-red-50 transition-colors flex-shrink-0 mt-0.5" style="color:var(--danger);">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                </div>`).join('');
        }

        function enterEditMode(patientId){
            const p=patients.find(x=>x.id===patientId);
            if(!p)return;
            editingPatientId=patientId;
            $('inpName').value=p.name;$('inpRoom').value=p.room;$('inpBed').value=p.bed;
            currentMeds=[...p.meds];renderMedsList();
            $('btnSaveText').textContent='تحديث بيانات المريض';
            $('btnSave').classList.remove('btn-gold');$('btnSave').classList.add('btn-update');
            $('btnCancelEdit').classList.remove('hidden');
            window.scrollTo({top:0,behavior:'smooth'});
        }
        window._editPatient=enterEditMode;

        function exitEditMode(){
            editingPatientId=null;
            $('inpName').value='';$('inpRoom').value='';$('inpBed').value='';
            $('selCategory').value='';updateDrugDropdown();$('inpDose').value='';$('selTiming').value='';$('selWarning').value='';
            $('previewBox').classList.add('hidden');$('btnAddMed').disabled=true;
            currentMeds=[];renderMedsList();
            $('btnSaveText').textContent='حفظ المريض في الطابور';
            $('btnSave').classList.add('btn-gold');$('btnSave').classList.remove('btn-update');
            $('btnCancelEdit').classList.add('hidden');
        }
        $('btnCancelEdit').addEventListener('click',exitEditMode);

        async function saveOrUpdatePatient(){
            const name=$('inpName').value.trim(),room=$('inpRoom').value.trim(),bed=$('inpBed').value.trim();
            if(!name||!room||!bed){showToast('أكمل بيانات المريض','error');return;}
            if(!currentMeds.length){showToast('أضف دواء واحد على الأقل','error');return;}
            const data={name,room,bed,meds:[...currentMeds]};
            if(editingPatientId){
                showToast('جاري التحديث...','info');
                try{await updateDoc(doc(db,"counseling_patients",editingPatientId),data);exitEditMode();showToast('تم تحديث بيانات المريض بنجاح');}
                catch(err){console.error('Update error:',err);showToast('فشل التحديث: '+err.message,'error');}
            }else{
                data.saveDate=new Date().toISOString();
                showToast('جاري الحفظ...','info');
                try{
                    await addDoc(patientsRef,data);
                    $('inpName').value='';$('inpRoom').value='';$('inpBed').value='';
                    $('selCategory').value='';updateDrugDropdown();$('inpDose').value='';$('selTiming').value='';$('selWarning').value='';
                    $('previewBox').classList.add('hidden');$('btnAddMed').disabled=true;
                    currentMeds=[];renderMedsList();showToast('تم حفظ المريض بنجاح');
                }catch(err){console.error('Save error:',err);showToast('فشل الحفظ: '+err.message,'error');}
            }
        }

        function startListener(){
            onSnapshot(query(patientsRef,orderBy("saveDate","desc")),
                (s)=>{setConnection(true);patients=s.docs.map(d=>({id:d.id,...d.data()}));renderQueue();},
                (e)=>{console.error(e);setConnection(false);showToast('فقد الاتصال بقاعدة البيانات','error');}
            );
        }
        async function deletePatient(id){
            const b=patients.find(p=>p.id===id);
            if(editingPatientId===id)exitEditMode();
            patients=patients.filter(p=>p.id!==id);renderQueue();
            try{await deleteDoc(doc(db,"counseling_patients",id));}
            catch(e){patients.unshift(b);renderQueue();showToast('فشل الحذف','error');}
        }

        function renderQueue(){
            const filter=toEnglishNums($('filterRoom').value.trim().toLowerCase());
            const filtered=filter?patients.filter(p=>toEnglishNums(p.room.toLowerCase()).includes(filter)):patients;
            const grid=$('queueGrid'),empty=$('emptyState');
            if(!filtered.length){grid.innerHTML='';empty.classList.remove('hidden');}
            else{
                empty.classList.add('hidden');
                grid.innerHTML=filtered.map(p=>{
                    const ds=new Date(p.saveDate).toLocaleDateString('ar-IQ',{year:'numeric',month:'short',day:'numeric'});
                    const isEditing=editingPatientId===p.id;
                    return`
                    <div class="patient-card card overflow-hidden ${isEditing?'ring-2 ring-purple-500':''}">
                        <div class="p-4 flex items-center justify-between" style="background:var(--surface);border-bottom:1px solid var(--border);">
                            <div class="flex items-center gap-3">
                                <div class="w-2 h-8 rounded-full ${isEditing?'bg-purple-500':'bg-[var(--accent)]'}"></div>
                                <div>
                                    <h3 class="font-bold text-[var(--fg)] font-arabic text-sm">${p.name}</h3>
                                    <p class="text-xs text-[var(--muted)]">غرفة ${normalizeDigits(p.room)} • سرير ${normalizeDigits(p.bed)} • ${ds}</p>
                                </div>
                            </div>
                            <div class="flex gap-1">
                                <button onclick="window._editPatient('${p.id}')" class="p-2 rounded-lg hover:bg-purple-50 transition-colors" style="color:#6D28D9;" title="تعديل">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                                </button>
                                <button onclick="window._deletePatient('${p.id}')" class="p-2 rounded-lg hover:bg-red-50 transition-colors" style="color:var(--danger);" title="حذف">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                                </button>
                            </div>
                        </div>
                        <div class="p-4 space-y-2">
                            ${p.meds.map(m=>`
                                <div class="flex items-start justify-between gap-2 text-xs border-b border-dashed last:border-0 pb-2" style="border-color:var(--border);">
                                    <div class="min-w-0">
                                        <span class="font-bold text-[var(--fg)]">${m.drugName}</span>
                                        <span class="font-semibold" style="color:var(--accent);"> ${m.dose} X ${m.freq}</span>
                                        ${m.timing?`<span class="font-semibold" style="color:var(--gold);"> • ${m.timing}</span>`:''}
                                    </div>
                                    <div class="text-left flex-shrink-0 font-arabic text-[10px] leading-relaxed" style="color:var(--muted);max-width:140px;">${m.instruction}</div>
                                </div>`).join('')}
                        </div>
                    </div>`;}).join('');
            }
            updateCounter();
        }
        function updateCounter(){
            const t=patients.length;$('counterText').textContent=`${t} مريض`;
            $('counterBadge').classList.toggle('hidden',!t);$('emptyState').classList.toggle('hidden',t>0);
        }

        // Print Modal
        function openPrintModal(){
            if(!patients.length){showToast('لا يوجد مرضى في الطابور','error');return;}
            modalSelectedIds.clear();$('modalSearch').value='';$('modalSelAll').checked=false;
            renderModalList();$('printModal').classList.add('modal-active');
        }
        function closePrintModal(){$('printModal').classList.remove('modal-active');}
        window._closePrintModal=closePrintModal;

        function renderModalList(){
            const rawSearch=$('modalSearch').value.trim();
            const searchEn=toEnglishNums(rawSearch.toLowerCase());
            const filtered=rawSearch?patients.filter(p=>toEnglishNums(p.room.toLowerCase()).includes(searchEn)||p.name.toLowerCase().includes(searchEn)):patients;
            const list=$('modalPatientList');
            if(!filtered.length){
                list.innerHTML=`<div class="text-center py-8"><p class="text-[var(--muted)] font-arabic text-sm">لا توجد نتائج مطابقة</p><p class="text-[var(--muted-lt)] text-xs mt-1 font-arabic">جرّب رقم غرفة مختلف</p></div>`;
            }else{
                list.innerHTML=filtered.map(p=>{
                    const checked=modalSelectedIds.has(p.id)?'checked':'';
                    return`
                    <label class="flex items-center gap-3 p-3 rounded-xl cursor-pointer transition-colors hover:bg-[var(--surface)]" style="border:1px solid var(--border);">
                        <input type="checkbox" ${checked} onchange="window._toggleModalSelect('${p.id}')" class="w-4 h-4 rounded flex-shrink-0 accent-[var(--accent)]">
                        <div class="flex-1 min-w-0">
                            <p class="font-bold text-[var(--fg)] text-sm font-arabic">${p.name}</p>
                            <p class="text-xs text-[var(--muted)]">غرفة <span class="font-semibold">${normalizeDigits(p.room)}</span> • سرير ${normalizeDigits(p.bed)} • ${p.meds.length} أدوية</p>
                        </div>
                        <span class="px-2 py-1 rounded-lg text-xs font-bold flex-shrink-0" style="background:rgba(20,83,45,.08);color:var(--accent);">${normalizeDigits(p.room)}</span>
                    </label>`;}).join('');
            }
            updateModalCount();
        }
        function updateModalCount(){
            $('modalSelCount').textContent=modalSelectedIds.size;
            $('btnModalPrint').disabled=modalSelectedIds.size===0;
            if(patients.length>0)$('modalSelAll').checked=patients.every(p=>modalSelectedIds.has(p.id));
        }
        window._toggleModalSelect=(id)=>{
            if(modalSelectedIds.has(id))modalSelectedIds.delete(id);else modalSelectedIds.add(id);
            updateModalCount();renderModalList();
        };

        // PDF
        const ROWS_PER_PAGE=9;
        function buildPDFPage(patient,pageMeds,emptyCount,displayName,isLastPage){
            const printDate=new Date().toLocaleDateString('ar-IQ',{year:'numeric',month:'long',day:'numeric'});
            let html=`<div class="pdf-title">ورقة استشارة دوائية للمريض</div><div class="pdf-subtitle">Patient Medication Counseling Sheet</div>
                <div class="pdf-info-row">
                    <div class="pdf-info-item"><span class="pdf-info-label">اسم المريض:</span><span class="pdf-info-value">${displayName}</span></div>
                    <div class="pdf-info-item"><span class="pdf-info-label">الغرفة:</span><span class="pdf-info-value">${patient.room}</span></div>
                    <div class="pdf-info-item"><span class="pdf-info-label">السرير:</span><span class="pdf-info-value">${patient.bed}</span></div>
                    <div class="pdf-info-item"><span class="pdf-info-label">التاريخ:</span><span class="pdf-info-value">${printDate}</span></div>
                </div><div class="pdf-table-wrap"><div class="pdf-thead"><div class="pdf-th"></div><div class="pdf-th">اسم الدواء</div><div class="pdf-th">الجرعة</div><div class="pdf-th">التعليمات</div></div><div class="pdf-tbody">`;
            for(const m of pageMeds){
                html+=`<div class="pdf-row"><div class="pdf-cell"></div><div class="pdf-cell cell-name">${m.drugName}</div><div class="pdf-cell cell-dose">${m.dose} X ${m.freq}</div><div class="pdf-cell cell-instr"><div><div class="instr-main">${m.instruction}</div>${m.timing?`<div class="instr-timing">${m.timing}</div>`:''}${m.warningText?`<div class="instr-warning">${m.warningText}</div>`:''}</div></div></div>`;
            }
            for(let i=0;i<emptyCount;i++){html+=`<div class="pdf-row"><div class="pdf-cell"></div><div class="pdf-cell cell-name"></div><div class="pdf-cell cell-dose"></div><div class="pdf-cell cell-instr"></div></div>`;}
            html+=`</div></div>`;
            if(isLastPage){html+=`<div class="pdf-footer"><div class="pdf-sig-block"><div class="pdf-sig-label">توقيع الصيدلاني السريري</div><div class="pdf-sig-line"></div></div><div class="pdf-watermark">Clinical Pharmacy Counseling Tool</div></div>`;}
            const pageDiv=document.createElement('div');pageDiv.className='pdf-page';pageDiv.innerHTML=html;return pageDiv;
        }

        async function generatePDF(patientList){
            if(!patientList.length){showToast('لا يوجد مرضى محددين','error');return;}
            showToast('جاري إنشاء PDF...','info');
            const container=$('pdf-render-container');container.innerHTML='';
            const{jsPDF}=window.jspdf;const doc=new jsPDF({orientation:'p',unit:'mm',format:'a4'});
            for(let pi=0;pi<patientList.length;pi++){
                const p=patientList[pi];const meds=p.meds||[];const totalPages=Math.ceil(meds.length/ROWS_PER_PAGE);
                for(let pg=0;pg<totalPages;pg++){
                    const start=pg*ROWS_PER_PAGE;const pageMeds=meds.slice(start,start+ROWS_PER_PAGE);
                    const emptyCount=ROWS_PER_PAGE-pageMeds.length;const isLastPage=(pg===totalPages-1);
                    const displayName=pg>0?p.name+' (تابع)':p.name;
                    const pageDiv=buildPDFPage(p,pageMeds,emptyCount,displayName,isLastPage);
                    container.appendChild(pageDiv);await document.fonts.ready;await new Promise(r=>setTimeout(r,250));
                    const canvas=await html2canvas(pageDiv,{scale:2.5,useCORS:true,logging:false,backgroundColor:'#ffffff',width:pageDiv.offsetWidth,height:pageDiv.offsetHeight});
                    const imgData=canvas.toDataURL('image/jpeg',0.98);
                    if(pi>0||pg>0)doc.addPage();doc.addImage(imgData,'JPEG',0,0,210,297);container.removeChild(pageDiv);
                }
            }
            const fn=patientList.length===1?`Counseling_${patientList[0].name}_${patientList[0].room}.pdf`:`Counseling_Batch_${new Date().toISOString().split('T')[0]}.pdf`;
            doc.save(fn);showToast('تم إنشاء PDF بنجاح');
        }

        window._deletePatient=(id)=>deletePatient(id);

        $('selCategory').addEventListener('change',updateDrugDropdown);
        $('selDrug').addEventListener('change',onDrugSelected);
        $('inpCustomDrug').addEventListener('input',updatePreview);
        $('selPills').addEventListener('change',updatePreview);
        $('selFreq').addEventListener('change',updatePreview);
        $('selTiming').addEventListener('change',updatePreview);
        $('selMethod').addEventListener('change',updatePreview);
        $('selWarning').addEventListener('change',updatePreview);
        $('inpDose').addEventListener('input',updatePreview);
        $('btnAddMed').addEventListener('click',addMedication);
        $('btnClearMeds').addEventListener('click',()=>{currentMeds=[];renderMedsList();});
        $('btnSave').addEventListener('click',saveOrUpdatePatient);
        $('filterRoom').addEventListener('input',()=>renderQueue());
        $('btnClearQueue').addEventListener('click',()=>{
            if(!patients.length)return;if(editingPatientId)exitEditMode();
            patients.forEach(p=>{deleteDoc(doc(db,"counseling_patients",p.id)).catch(()=>{});});
            showToast('تم مسح الطابور','info');
        });
        $('btnOpenPrintModal').addEventListener('click',openPrintModal);
        $('modalSearch').addEventListener('input',()=>renderModalList());
        $('modalSelAll').addEventListener('change',(e)=>{
            if(e.target.checked)patients.forEach(p=>modalSelectedIds.add(p.id));else modalSelectedIds.clear();
            updateModalCount();renderModalList();
        });
        $('btnModalPrint').addEventListener('click',async()=>{
            const sel=patients.filter(p=>modalSelectedIds.has(p.id));
            await generatePDF(sel);closePrintModal();
        });
        document.addEventListener('keydown',(e)=>{
            if(e.key==='Escape'&&$('printModal').classList.contains('modal-active'))closePrintModal();
        });

        initDarkMode();updateDrugDropdown();startListener();
    </script>
</body>
</html>
