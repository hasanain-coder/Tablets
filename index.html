<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أداة تثقيف المريض الدوائي | Clinical Pharmacy Counseling</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@300;400;500;600;700&family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* =============================================
           متغيرات الألوان — الوضع الفاتح والداكن
           ============================================= */
        :root {
            --bg: #FAF8F3;
            --bg-alt: #F5F2EB;
            --fg: #1C1917;
            --fg-sec: #44403C;
            --muted: #78716C;
            --muted-lt: #A8A29E;
            --accent: #14532D;
            --accent-mid: #166534;
            --accent-lt: #22C55E;
            --gold: #B8860B;
            --gold-lt: #DAA520;
            --card: #FFFFFF;
            --border: #E7E5E0;
            --surface: #F0EDE6;
            --danger: #991B1B;
        }
        body.dark-mode {
            --bg: #0C0F0A;
            --bg-alt: #11140E;
            --fg: #E7E5E0;
            --fg-sec: #D6D3CE;
            --muted: #A8A29E;
            --muted-lt: #78716C;
            --accent: #22C55E;
            --accent-mid: #16A34A;
            --accent-lt: #4ADE80;
            --gold: #DAA520;
            --gold-lt: #F59E0B;
            --card: #1A1D16;
            --border: #2E3228;
            --surface: #14170F;
            --danger: #F87171;
        }

        /* =============================================
           أساسيات الخطوط والجسم
           ============================================= */
        * {
            font-family: 'DM Sans', 'Cairo', sans-serif;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
            box-sizing: border-box;
        }
        .font-display { font-family: 'Playfair Display', serif; }
        .font-arabic { font-family: 'Cairo', sans-serif; }
        body {
            background: var(--bg);
            color: var(--fg);
            transition: background 0.4s ease, color 0.4s ease;
            min-height: 100vh;
        }
        /* خلفية متدرجة دقيقة */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 0%, rgba(20,83,45,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(184,134,11,0.04) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        body.dark-mode::before {
            background:
                radial-gradient(ellipse at 20% 0%, rgba(34,197,94,0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(218,165,32,0.03) 0%, transparent 50%);
        }

        /* =============================================
           شريط التمرير المخصص
           ============================================= */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--surface); }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }

        /* =============================================
           الحركات والتأثيرات
           ============================================= */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideRight {
            from { opacity: 0; transform: translateX(-16px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.3); }
            50% { box-shadow: 0 0 20px 4px rgba(34,197,94,0.15); }
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .anim-fade-up { animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) forwards; }
        .anim-slide-right { animation: slideRight 0.5s cubic-bezier(0.22,1,0.36,1) forwards; }

        /* =============================================
           حقول الإدخال — الأنماط الموحدة
           ============================================= */
        input, select, textarea {
            background: var(--surface);
            color: var(--fg);
            border: 1.5px solid var(--border);
            transition: all 0.25s ease;
            font-size: 14px;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(20,83,45,0.1);
            background: var(--card);
        }
        /* إصلاح لون النص في الوضع الداكن */
        body.dark-mode input,
        body.dark-mode select,
        body.dark-mode textarea {
            color: #E7E5E0 !important;
            caret-color: #E7E5E0;
        }
        /* إصلاح خلفية الملء التلقائي */
        input:-webkit-autofill,
        input:-webkit-autofill:focus {
            -webkit-box-shadow: 0 0 0 30px var(--surface) inset !important;
            -webkit-text-fill-color: var(--fg) !important;
        }
        body.dark-mode input:-webkit-autofill {
            -webkit-text-fill-color: #E7E5E0 !important;
        }

        /* =============================================
           الأزرار الرئيسية
           ============================================= */
        .btn-primary {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-mid) 100%);
            color: white;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .btn-primary::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            background-size: 200% 100%;
            animation: shimmer 3s ease infinite;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(20,83,45,0.25);
        }
        .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-primary:active:not(:disabled) { transform: translateY(0); }

        .btn-gold {
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-lt) 100%);
            color: white;
            transition: all 0.3s ease;
        }
        .btn-gold:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(184,134,11,0.25);
        }
        .btn-gold:disabled { opacity: 0.4; cursor: not-allowed; }

        /* =============================================
           البطاقات
           ============================================= */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            transition: all 0.3s ease;
        }
        .card:hover { box-shadow: 0 12px 40px rgba(0,0,0,0.06); }
        body.dark-mode .card:hover { box-shadow: 0 12px 40px rgba(0,0,0,0.3); }

        /* نقطة الاتصال الحية */
        .live-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: #22C55E; display: inline-block;
            animation: pulseGlow 2s ease infinite;
        }
        .live-dot.offline { background: #EF4444; animation: none; }

        /* صندوق معاينة التعليمات */
        .instruction-preview {
            background: linear-gradient(135deg, rgba(20,83,45,0.06), rgba(184,134,11,0.04));
            border: 1.5px solid rgba(20,83,45,0.15);
            border-radius: 12px;
            padding: 16px;
            direction: rtl;
            text-align: right;
        }
        body.dark-mode .instruction-preview {
            background: linear-gradient(135deg, rgba(34,197,94,0.08), rgba(218,165,32,0.05));
            border-color: rgba(34,197,94,0.2);
        }

        /* =============================================
           أنماط صفحة PDF — التصميم الجديد
           ============================================= */
        #pdf-render-container {
            position: absolute;
            left: -9999px;
            top: 0;
            z-index: -1000;
            opacity: 0;
            pointer-events: none;
        }

        /* صفحة A4 كاملة — flex column لتوزيع المساحة */
        .pdf-page {
            width: 210mm;
            height: 297mm;
            padding: 10mm 12mm;
            background: white;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
            direction: rtl;
            color: #000;
            display: flex;
            flex-direction: column;
        }

        /* العنوان الرئيسي */
        .pdf-title {
            text-align: center;
            font-size: 15pt;
            font-weight: 800;
            color: #14532D;
            margin-bottom: 1.5mm;
            letter-spacing: 0.3px;
            flex-shrink: 0;
        }
        .pdf-subtitle {
            text-align: center;
            font-size: 8.5pt;
            color: #888;
            margin-bottom: 5mm;
            font-weight: 400;
            flex-shrink: 0;
        }

        /* صف معلومات المريض — توسيط مثالي */
        .pdf-info-row {
            display: flex;
            gap: 3mm;
            margin-bottom: 4mm;
            direction: rtl;
            flex-shrink: 0;
        }
        .pdf-info-item {
            flex: 1;
            border: 1.5px solid #333;
            border-radius: 3px;
            padding: 2.5mm 3mm;
            font-size: 9.5pt;
            /* توسيط أفقي وعمودي مثالي */
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 1.5mm;
        }
        .pdf-info-label {
            font-weight: 700;
            color: #14532D;
            white-space: nowrap;
        }
        .pdf-info-value {
            font-weight: 700;
            color: #000;
        }

        /* =============================================
           هيكل الجدول — CSS Grid بدلاً من <table>
           لضمان توزيع الصفوف بالتساوي
           ============================================= */
        .pdf-table-wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            border: 1.5px solid #0A2E18;
        }

        /* رأس الجدول */
        .pdf-thead {
            display: grid;
            grid-template-columns: 14% 22% 18% 46%;
            flex-shrink: 0;
        }
        .pdf-th {
            background: #14532D;
            color: white;
            padding: 2.5mm 2mm;
            font-weight: 700;
            font-size: 9.5pt;
            text-align: center;
            border-left: 1.5px solid #0A2E18;
            border-bottom: 1.5px solid #0A2E18;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .pdf-th:last-child { border-left: none; }

        /* جسم الجدول — 9 صفوف بتساوي تام */
        .pdf-tbody {
            flex: 1;
            display: grid;
            grid-template-rows: repeat(9, 1fr);
        }

        /* صف واحد */
        .pdf-row {
            display: grid;
            grid-template-columns: 14% 22% 18% 46%;
            border-bottom: 1px solid #999;
        }
        .pdf-row:nth-child(even) .pdf-cell { background: #FAFAF7; }
        .pdf-row:last-child { border-bottom: none; }

        /* خلية واحدة */
        .pdf-cell {
            border-left: 1px solid #999;
            padding: 1.5mm 2mm;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9pt;
            overflow: hidden;
        }
        .pdf-cell:last-child { border-left: none; }

        /* أنماط خاصة بالأعمدة */
        .cell-pill {
            /* عمود فارغ للصق الحبوب */
        }
        .cell-name {
            font-weight: 700;
            text-align: center;
            direction: ltr;
        }
        .cell-dose {
            font-weight: 700;
            text-align: center;
            direction: ltr;
        }
        .cell-instr {
            align-items: flex-start;
            justify-content: flex-start;
            text-align: right;
            direction: rtl;
            font-weight: 600;
            line-height: 1.6;
            font-size: 8.5pt;
            padding: 1.5mm 2.5mm;
        }
        .instr-main {
            font-weight: 800;
            font-size: 9pt;
        }
        .instr-timing {
            color: #14532D;
            font-weight: 700;
            font-size: 8pt;
            margin-top: 0.5mm;
        }
        .instr-warning {
            color: #B91C1C;
            font-weight: 700;
            font-size: 7.5pt;
            margin-top: 0.3mm;
        }

        /* =============================================
           توقيع الصيدلاني — أسفل يسار الصفحة
           ============================================= */
        .pdf-footer {
            flex-shrink: 0;
            margin-top: 3mm;
            padding-top: 2.5mm;
            border-top: 1.5px solid #333;
            /* تجاوز RTL لإظهار التوقيع على اليسار البصري */
            direction: ltr;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        .pdf-sig-block { text-align: left; }
        .pdf-sig-label {
            font-size: 10.5pt;
            font-weight: 800;
            color: #14532D;
            direction: rtl;
            display: inline-block;
        }
        .pdf-sig-line {
            border-bottom: 1.5px solid #333;
            width: 65mm;
            margin-top: 1.5mm;
            height: 14mm;
        }
        .pdf-watermark {
            text-align: right;
            direction: ltr;
            font-size: 6.5pt;
            color: #ccc;
        }

        /* =============================================
           الإشعارات (Toast)
           ============================================= */
        #toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            padding: 12px 28px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 14px;
            z-index: 10000;
            opacity: 0;
            transition: all 0.35s cubic-bezier(0.22,1,0.36,1);
            pointer-events: none;
            font-family: 'Cairo', sans-serif;
            direction: rtl;
        }
        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* =============================================
           تأخير ظهور بطاقات الطابور
           ============================================= */
        .patient-card {
            opacity: 0;
            animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) forwards;
        }
        .patient-card:nth-child(1) { animation-delay: 0s; }
        .patient-card:nth-child(2) { animation-delay: 0.06s; }
        .patient-card:nth-child(3) { animation-delay: 0.12s; }
        .patient-card:nth-child(4) { animation-delay: 0.18s; }
        .patient-card:nth-child(5) { animation-delay: 0.24s; }
        .patient-card:nth-child(6) { animation-delay: 0.3s; }

        /* =============================================
           التجاوب مع الشاشات الصغيرة
           ============================================= */
        @media (max-width: 640px) {
            .med-grid { grid-template-columns: 1fr !important; }
        }

        /* إخفاء كل شيء عند الطباعة (الطباعة تتم عبر PDF) */
        @media print {
            body * { display: none !important; }
        }

        /* احترام تفضيل تقليل الحركة */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <!-- ===== التطبيق الرئيسي ===== -->
    <div id="mainApp" style="position:relative; z-index:1;">

        <!-- ===== الشريط العلوي ===== -->
        <header class="sticky top-0 z-50 border-b border-[var(--border)]" style="background: rgba(250,248,243,0.92); backdrop-filter: blur(16px);">
            <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-11 h-11 rounded-xl bg-gradient-to-br from-[var(--accent)] to-[var(--accent-mid)] flex items-center justify-center shadow-lg shadow-[var(--accent)]/20">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/></svg>
                    </div>
                    <div>
                        <h1 class="text-lg md:text-xl font-bold text-[var(--fg)] font-display tracking-tight">Medication Counseling</h1>
                        <p class="text-xs text-[var(--muted)] font-arabic">أداة تثقيف المريض الدوائي</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <!-- حالة الاتصال -->
                    <div class="flex items-center gap-1.5 px-3 py-1.5 rounded-full border border-[var(--border)]" style="background: var(--surface);">
                        <span id="connDot" class="live-dot"></span>
                        <span id="connText" class="text-xs font-semibold text-[var(--muted)]">متصل</span>
                    </div>
                    <!-- زر الوضع الداكن -->
                    <button id="darkToggle" class="w-10 h-10 rounded-xl border border-[var(--border)] flex items-center justify-center hover:border-[var(--accent)] transition-all" style="background: var(--surface);" aria-label="تبديل الوضع الليلي">
                        <svg id="iconMoon" class="w-5 h-5 text-[var(--fg)]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                        <svg id="iconSun" class="w-5 h-5 text-[var(--fg)] hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                    </button>
                    <!-- عداد المرضى -->
                    <div id="counterBadge" class="hidden px-3 py-1.5 rounded-full text-xs font-bold" style="background: rgba(20,83,45,0.1); color: var(--accent); border: 1px solid rgba(20,83,45,0.15);">
                        <span id="counterText">0</span>
                    </div>
                </div>
            </div>
        </header>

        <main class="max-w-6xl mx-auto px-4 py-6 space-y-6">

            <!-- ===== قسم بيانات المريض ===== -->
            <section class="card overflow-hidden anim-fade-up">
                <div class="px-6 py-4" style="background: linear-gradient(135deg, var(--accent) 0%, var(--accent-mid) 100%);">
                    <h2 class="text-lg text-white font-bold font-arabic">بيانات المريض</h2>
                    <p class="text-white/60 text-xs mt-0.5">Patient Identification</p>
                </div>
                <div class="p-6">
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-[var(--fg)] font-arabic">اسم المريض</label>
                            <input type="text" id="inpName" class="w-full px-4 py-3 rounded-xl" placeholder="أدخل اسم المريض">
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-[var(--fg)] font-arabic">رقم الغرفة</label>
                            <input type="text" id="inpRoom" class="w-full px-4 py-3 rounded-xl" placeholder="مثال: 204">
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-[var(--fg)] font-arabic">رقم السرير</label>
                            <input type="text" id="inpBed" class="w-full px-4 py-3 rounded-xl" placeholder="مثال: 3">
                        </div>
                    </div>
                </div>
            </section>

            <!-- ===== قسم إضافة دواء ===== -->
            <section class="card overflow-hidden anim-fade-up" style="animation-delay: 0.1s;">
                <div class="px-6 py-4 flex items-center gap-3" style="background: linear-gradient(135deg, var(--gold) 0%, var(--gold-lt) 100%);">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
                    <div>
                        <h2 class="text-lg text-white font-bold font-arabic">إضافة دواء</h2>
                        <p class="text-white/60 text-xs">Add Medication Entry</p>
                    </div>
                </div>
                <div class="p-6 space-y-5">
                    <!-- الصف الأول: التصنيف، الدواء، الجرعة، عدد الحبات -->
                    <div class="med-grid grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-[var(--fg)] font-arabic">التصنيف</label>
                            <select id="selCategory" class="w-full px-4 py-3 rounded-xl">
                                <option value="">-- اختر التصنيف --</option>
                                <option value="cardiac">قلبية (Cardiac)</option>
                                <option value="antibiotics">مضادات حيوية (Antibiotics)</option>
                                <option value="others">أخرى (Others)</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-[var(--fg)] font-arabic">اسم الدواء</label>
                            <select id="selDrug" class="w-full px-4 py-3 rounded-xl" disabled>
                                <option value="">-- اختر التصنيف أولاً --</option>
                            </select>
                            <input type="text" id="inpCustomDrug" class="hidden w-full px-4 py-3 rounded-xl" placeholder="اسم الدواء (يدوي)">
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-[var(--fg)] font-arabic">الجرعة</label>

                        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>

                    </div>

                    <p class="text-[var(--muted)] text-sm mt-1 opacity-60 font-arabic">أضف بيانات المريض أعلاه للبدء</p>

    <!-- حاوية تصيير PDF — مخفية خارج الشاشة -->
    <div id="pdf-render-container"></div>

    <!-- إشعار Toast -->
    <div id="toast"><span id="toastMsg"></span></div>

    <!-- ===== منطق التطبيق و Firebase ===== -->
    <script type="module">
        // =============================================
        // إعداد Firebase
        // =============================================
        const firebaseConfig = {
            apiKey: "AIzaSyAaMqxvBAuTkOykYHF5w_xjS98bDOhZoPY",
            authDomain: "documentation2-dd1aa.firebaseapp.com",
            projectId: "documentation2-dd1aa",
            storageBucket: "documentation2-dd1aa.firebasestorage.app",
            messagingSenderId: "236681783643",
            appId: "1:236681783643:web:dc4d715258955b3413d27e",
            measurementId: "G-WRK2C3121X"
        };

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import {
            getFirestore, collection, addDoc, deleteDoc, doc,
            onSnapshot, query, orderBy
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const patientsRef = collection(db, "counseling_patients");

        // =============================================
        // قاعدة بيانات الأدوية
        // =============================================
        const DRUG_DB = {
            cardiac: [
                { name: 'Aspirin', defaultDose: '75mg' },
                { name: 'Plavix (Clopidogrel)', defaultDose: '75mg' },
                { name: 'Atorvastatin', defaultDose: '20mg' },
                { name: 'Bisoprolol', defaultDose: '5mg' }
            ],
            antibiotics: [
                { name: 'Amoxicillin', defaultDose: '500mg' },
                { name: 'Augmentin', defaultDose: '625mg' },
                { name: 'Azithromycin', defaultDose: '500mg' }
            ],
            others: []
        };

        // =============================================
        // قواميس التحويل للعربية
        // =============================================

        // تحويل عدد الحبات إلى كلمات عربية
        const PILLS_ARABIC = {
            1: 'حبة واحدة',
            2: 'حبتين',
            3: 'ثلاث حبات',
            4: 'أربع حبات',
            5: 'خمس حبات'
        };

        // تحويل التكرار إلى كلمات عربية
        const FREQ_ARABIC = {
            1: 'مرة واحدة',
            2: 'مرتين',
            3: 'ثلاث مرات',
            4: 'أربع مرات'
        };

        // تحويل طريقة الإعطاء إلى عربية
        const METHOD_ARABIC = {
            before: 'قبل الطعام',
            after: 'بعد الطعام'
        };

        // تحويل الملاحظات التحذيرية إلى عربية
        const WARNING_ARABIC = {
            milk: 'لا تؤخذ مع الحليب',
            drowsy: 'تسبب النعاس',
            water: 'اشرب كميات كافية من الماء',
            crush: 'لا تسحق القرص'
        };

        // =============================================
        // حالة التطبيق
        // =============================================
        let patients = [];
        let currentMeds = [];
        let selectedIds = new Set();

        // اختصار لـ getElementById
        const $ = id => document.getElementById(id);

        // =============================================
        // الدوال المساعدة
        // =============================================

        /**
         * توليد جملة التعليمات العربية الكاملة
         * المخرج مثال: "تؤخذ حبتين بعد الطعام ثلاث مرات يومياً"
         */
        function generateArabicInstruction(pills, method, freq) {
            const p = PILLS_ARABIC[pills] || `${pills} حبات`;
            const m = METHOD_ARABIC[method] || '';
            const f = FREQ_ARABIC[freq] || `${freq} مرات`;
            return `تؤخذ ${p} ${m} ${f} يومياً`;
        }

        /** توليد معرف فريد */
        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2, 8);
        }

        /** عرض إشعار مؤقت */
        function showToast(msg, type = 'success') {
            const colors = {
                success: 'background:#14532D;color:white;',
                error: 'background:#991B1B;color:white;',
                info: 'background:#1C1917;color:white;'
            };
            const toast = $('toast');
            $('toastMsg').textContent = msg;
            toast.style.cssText += colors[type] || colors.info;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        /** تحديث حالة الاتصال في الشريط العلوي */
        function setConnection(online) {
            $('connDot').classList.toggle('offline', !online);
            $('connText').textContent = online ? 'متصل' : 'غير متصل';
        }

        // =============================================
        // الوضع الداكن
        // =============================================
        function initDarkMode() {
            const isDark = localStorage.getItem('counseling_theme') === 'dark';
            document.body.classList.toggle('dark-mode', isDark);
            $('iconMoon').classList.toggle('hidden', isDark);
            $('iconSun').classList.toggle('hidden', !isDark);
        }

        $('darkToggle').addEventListener('click', () => {
            const isDark = document.body.classList.toggle('dark-mode');
            localStorage.setItem('counseling_theme', isDark ? 'dark' : 'light');
            $('iconMoon').classList.toggle('hidden', isDark);
            $('iconSun').classList.toggle('hidden', !isDark);
        });

        // =============================================
        // منطق القوائم المنسدلة للأدوية
        // =============================================

        /** تحديث قائمة الأدوية بناءً على التصنيف المختار */
        function updateDrugDropdown() {
            const cat = $('selCategory').value;
            const sel = $('selDrug');
            const custom = $('inpCustomDrug');

            sel.innerHTML = '';
            custom.classList.add('hidden');
            sel.disabled = true;

            if (!cat) {
                sel.innerHTML = '<option value="">-- اختر التصنيف أولاً --</option>';
                return;
            }

            sel.disabled = false;

            // التصنيف "أخرى" يظهر حقل إدخال يدوي
            if (cat === 'others') {
                custom.classList.remove('hidden');
                sel.innerHTML = '<option value="custom">إدخال يدوي</option>';
                return;
            }

            // عرض الأدوية من قاعدة البيانات
            const drugs = DRUG_DB[cat] || [];
            sel.innerHTML = '<option value="">-- اختر الدواء --</option>' +
                drugs.map(d => `<option value="${d.name}" data-dose="${d.defaultDose}">${d.name}</option>`).join('');
        }

        /** عند اختيار دواء — يملأ الجرعة الافتراضية تلقائياً */
        function onDrugSelected() {
            const val = $('selDrug').value;
            if (val && val !== 'custom') {
                const opt = $('selDrug').selectedOptions[0];
                $('inpDose').value = opt.dataset.dose || '';
            } else if (val !== 'custom') {
                $('inpDose').value = '';
            }
            updatePreview();
        }

        /** تحديث معاينة التعليمات العربية بشكل حي */
        function updatePreview() {
            const pills = parseInt($('selPills').value) || 1;
            const method = $('selMethod').value;
            const freq = parseInt($('selFreq').value) || 1;
            const warning = $('selWarning').value;
            const timing = $('selTiming').value;

            // توليد وعرض الجملة العربية
            $('previewText').textContent = generateArabicInstruction(pills, method, freq);
            $('previewBox').classList.remove('hidden');

            // عرض وقت الإعطاء
            if (timing) {
                $('previewTiming').textContent = 'الوقت: ' + timing;
                $('previewTiming').classList.remove('hidden');
            } else {
                $('previewTiming').classList.add('hidden');
            }

            // عرض التحذير إن وُجد
            if (warning && WARNING_ARABIC[warning]) {
                $('previewWarning').textContent = 'تنبيه: ' + WARNING_ARABIC[warning];
                $('previewWarning').classList.remove('hidden');
            } else {
                $('previewWarning').classList.add('hidden');
            }

            // تفعيل زر الإضافة فقط عند اكتمال البيانات المطلوبة
            const cat = $('selCategory').value;
            const drugVal = $('selDrug').value;
            const customName = cat === 'others' ? $('inpCustomDrug').value.trim() : '';
            const hasDrug = (drugVal && drugVal !== 'custom') || (drugVal === 'custom' && customName);
            const hasDose = $('inpDose').value.trim();
            $('btnAddMed').disabled = !(cat && hasDrug && hasDose);
        }

        // =============================================
        // إضافة وحذف الأدوية من القائمة الحالية
        // =============================================

        function addMedication() {
            const cat = $('selCategory').value;
            const drugVal = $('selDrug').value;
            let drugName = drugVal === 'custom' ? $('inpCustomDrug').value.trim() : drugVal;
            const dose = $('inpDose').value.trim();
            const pills = parseInt($('selPills').value) || 1;
            const freq = parseInt($('selFreq').value) || 1;
            const timing = $('selTiming').value;
            const method = $('selMethod').value;
            const warning = $('selWarning').value;

            // التحقق من اكتمال البيانات
            if (!drugName || !dose) {
                showToast('أكمل بيانات الدواء', 'error');
                return;
            }

            // منع تكرار نفس الدواء
            if (currentMeds.some(m => m.drugName.toLowerCase() === drugName.toLowerCase())) {
                showToast('هذا الدواء مضاف مسبقاً', 'error');
                return;
            }

            // إنشاء كائن الدواء وحفظه
            const instruction = generateArabicInstruction(pills, method, freq);
            const warningText = warning ? WARNING_ARABIC[warning] : '';

            currentMeds.push({
                id: generateId(),
                category: cat,
                drugName,
                dose,
                pills,
                freq,
                timing,
                method,
                warning,
                instruction,
                warningText
            });

            renderMedsList();
            showToast('تمت إضافة الدواء');

            // إعادة تعيين حقول الدواء فقط (نحافظ على التصنيف)
            $('selDrug').value = cat === 'others' ? 'custom' : '';
            $('inpDose').value = '';
            if (cat === 'others') $('inpCustomDrug').value = '';
            $('selTiming').value = '';
            $('selWarning').value = '';
            $('previewBox').classList.add('hidden');
            $('btnAddMed').disabled = true;
        }

        function removeMed(index) {
            currentMeds.splice(index, 1);
            renderMedsList();
        }
        // كشف الدالة للنقر من HTML
        window._removeMed = removeMed;

        /** عرض قائمة الأدوية المضافة في الواجهة */
        function renderMedsList() {
            const section = $('currentMedsSection');
            const list = $('medsList');

            if (currentMeds.length === 0) {
                section.classList.add('hidden');
                return;
            }

            section.classList.remove('hidden');
            $('medCount').textContent = currentMeds.length;

            list.innerHTML = currentMeds.map((m, i) => `
                <div class="anim-slide-right flex items-start justify-between gap-3 p-3 rounded-xl"
                     style="background:var(--surface);border:1px solid var(--border);animation-delay:${i * 0.05}s;">
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2 flex-wrap">
                            <span class="font-bold text-[var(--fg)] text-sm">${m.drugName}</span>
                            <span class="px-2 py-0.5 rounded-full text-xs font-semibold"
                                  style="background:rgba(20,83,45,0.08);color:var(--accent);">
                                ${m.dose} X ${m.freq}
                            </span>
                            ${m.timing ? `<span class="text-xs font-semibold" style="color:var(--gold);">${m.timing}</span>` : ''}
                        </div>
                        <p class="font-arabic text-sm font-bold mt-1" style="color:var(--fg);">${m.instruction}</p>
                        ${m.warningText ? `<p class="font-arabic text-xs font-bold mt-0.5" style="color:var(--danger);">${m.warningText}</p>` : ''}
                    </div>
                    <button onclick="window._removeMed(${i})"
                            class="p-1.5 rounded-lg hover:bg-red-50 transition-colors flex-shrink-0 mt-0.5"
                            style="color:var(--danger);">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
            `).join('');
        }

        // =============================================
        // حفظ المريض في Firestore
        // =============================================
        async function savePatient() {
            const name = $('inpName').value.trim();
            const room = $('inpRoom').value.trim();
            const bed = $('inpBed').value.trim();

            if (!name || !room || !bed) {
                showToast('أكمل بيانات المريض (الاسم، الغرفة، السرير)', 'error');
                return;
            }
            if (currentMeds.length === 0) {
                showToast('أضف دواء واحد على الأقل', 'error');
                return;
            }

            const patient = {
                name,
                room,
                bed,
                meds: [...currentMeds],
                saveDate: new Date().toISOString()
            };

            showToast('جاري الحفظ...', 'info');

            try {
                await addDoc(patientsRef, patient);
                // إعادة تعيين النموذج بالكامل بعد الحفظ الناجح
                $('inpName').value = '';
                $('inpRoom').value = '';
                $('inpBed').value = '';
                $('selCategory').value = '';
                updateDrugDropdown();
                $('inpDose').value = '';
                $('selTiming').value = '';
                $('selWarning').value = '';
                $('previewBox').classList.add('hidden');
                $('btnAddMed').disabled = true;
                currentMeds = [];
                renderMedsList();
                showToast('تم حفظ المريض بنجاح');
            } catch (err) {
                console.error('Save error:', err);
                showToast('فشل الحفظ: ' + err.message, 'error');
            }
        }

        // =============================================
        // مستمع Firestore في الوقت الحقيقي
        // =============================================
        function startListener() {
            onSnapshot(
                query(patientsRef, orderBy("saveDate", "desc")),
                (snapshot) => {
                    setConnection(true);
                    patients = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    renderQueue();
                },
                (err) => {
                    console.error('Listener error:', err);
                    setConnection(false);
                    showToast('فقد الاتصال بقاعدة البيانات', 'error');
                }
            );
        }

        /** حذف مريض مع تحسين محلي فوري */
        async function deletePatient(id) {
            const backup = patients.find(p => p.id === id);
            patients = patients.filter(p => p.id !== id);
            selectedIds.delete(id);
            renderQueue();
            try {
                await deleteDoc(doc(db, "counseling_patients", id));
            } catch (err) {
                console.error('Delete error:', err);
                patients.unshift(backup);
                renderQueue();
                showToast('فشل الحذف', 'error');
            }
        }

        // =============================================
        // عرض طابور المرضى
        // =============================================
        function renderQueue() {
            const filter = $('filterRoom').value.trim().toLowerCase();
            const filtered = filter
                ? patients.filter(p => p.room.toLowerCase().includes(filter))
                : patients;

            const grid = $('queueGrid');
            const empty = $('emptyState');

            if (filtered.length === 0) {
                grid.innerHTML = '';
                empty.classList.remove('hidden');
            } else {
                empty.classList.add('hidden');
                grid.innerHTML = filtered.map(p => {
                    const isSelected = selectedIds.has(p.id);
                    const dateStr = new Date(p.saveDate).toLocaleDateString('ar-IQ', {
                        year: 'numeric', month: 'short', day: 'numeric'
                    });
                    return `
                    <div class="patient-card card overflow-hidden">
                        <div class="p-4 flex items-center justify-between"
                             style="background:var(--surface);border-bottom:1px solid var(--border);">
                            <div class="flex items-center gap-3">
                                <input type="checkbox" ${isSelected ? 'checked' : ''}
                                    onchange="window._toggleSelect('${p.id}')"
                                    class="w-4 h-4 rounded accent-[var(--accent)]"
                                    aria-label="تحديد ${p.name}">
                                <div>
                                    <h3 class="font-bold text-[var(--fg)] font-arabic text-sm">${p.name}</h3>
                                    <p class="text-xs text-[var(--muted)]">غرفة ${p.room} • سرير ${p.bed} • ${dateStr}</p>
                                </div>
                            </div>
                            <div class="flex gap-1">
                                <button onclick="window._printSingle('${p.id}')"
                                    class="p-2 rounded-lg hover:bg-[var(--accent)]/10 transition-colors"
                                    style="color:var(--accent);" title="طباعة" aria-label="طباعة ${p.name}">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/>
                                    </svg>
                                </button>
                                <button onclick="window._deletePatient('${p.id}')"
                                    class="p-2 rounded-lg hover:bg-red-50 transition-colors"
                                    style="color:var(--danger);" title="حذف" aria-label="حذف ${p.name}">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                        <div class="p-4 space-y-2">
                            ${p.meds.map(m => `
                                <div class="flex items-start justify-between gap-2 text-xs border-b border-dashed last:border-0 pb-2"
                                     style="border-color:var(--border);">
                                    <div class="min-w-0">
                                        <span class="font-bold text-[var(--fg)]">${m.drugName}</span>
                                        <span class="font-semibold" style="color:var(--accent);"> ${m.dose} X ${m.freq}</span>
                                        ${m.timing ? `<span class="font-semibold" style="color:var(--gold);"> • ${m.timing}</span>` : ''}
                                    </div>
                                    <div class="text-left flex-shrink-0 font-arabic text-[10px] leading-relaxed"
                                         style="color:var(--muted);max-width:140px;">${m.instruction}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
                }).join('');
            }

            updateCounter();
        }

        /** تحديث عداد المرضى وحالة الأزرار */
        function updateCounter() {
            const total = patients.length;
            const sel = selectedIds.size;
            $('counterText').textContent = `${total} مريض`;
            $('counterBadge').classList.toggle('hidden', total === 0);
            $('btnPDF').disabled = sel === 0;
            $('emptyState').classList.toggle('hidden', total > 0);
            $('selAll').checked = total > 0 && total === sel;
        }

        // =============================================
        // إنشاء PDF — التصميم المحدث
        // =============================================

        /** عدد صفوف الجدول في كل صفحة A4 */
        const ROWS_PER_PAGE = 9;

        /**
         * توليد صفحة PDF واحدة
         * يُستخدم CSS Grid لضمان توزيع الصفوف بالتساوي
         */
        function buildPDFPage(patient, pageMeds, emptyCount, displayName, isLastPage) {
            const printDate = new Date().toLocaleDateString('ar-IQ', {
                year: 'numeric', month: 'long', day: 'numeric'
            });

            const pageDiv = document.createElement('div');
            pageDiv.className = 'pdf-page';

            // --- العنوان ---
            let html = `
                <div class="pdf-title"><span class="arabic-text" style="display:inline-block; direction:rtl;"> ورقة استشارة دوائية للمريض </span></div>
                <div class="pdf-subtitle">Patient Medication Counseling Sheet</div>
            `;

            // --- معلومات المريض — توسيط مثالي ---
            html += `
                <div class="pdf-info-row">
                    <div class="pdf-info-item">
                        <span class="pdf-info-label">اسم المريض:</span>
                        <span class="pdf-info-value">${displayName}</span>
                    </div>
                    <div class="pdf-info-item">
                        <span class="pdf-info-label">الغرفة:</span>
                        <span class="pdf-info-value">${patient.room}</span>
                    </div>
                    <div class="pdf-info-item">
                        <span class="pdf-info-label">السرير:</span>
                        <span class="pdf-info-value">${patient.bed}</span>
                    </div>
                    <div class="pdf-info-item">
                        <span class="pdf-info-label">التاريخ:</span>
                        <span class="pdf-info-value">${printDate}</span>
                    </div>
                </div>
            `;

            // --- الجدول باستخدام CSS Grid ---
            html += `<div class="pdf-table-wrap">`;

            // رأس الجدول
            html += `
                <div class="pdf-thead">
                    <div class="pdf-th"></div>
                    <div class="pdf-th">اسم الدواء</div>
                    <div class="pdf-th">الجرعة</div>
                    <div class="pdf-th">التعليمات</div>
                </div>
            `;

            // جسم الجدول — 9 صفوف بتساوي تام
            html += `<div class="pdf-tbody">`;

            // صفوف الأدوية الفعلية
            for (const m of pageMeds) {
                html += `
                    <div class="pdf-row">
                        <div class="pdf-cell cell-pill"></div>
                        <div class="pdf-cell cell-name">${m.drugName}</div>
                        <div class="pdf-cell cell-dose">${m.dose} X ${m.freq}</div>
                        <div class="pdf-cell cell-instr">
                            <div>
                                <div class="instr-main">${m.instruction}</div>
                                ${m.timing ? `<div class="instr-timing">${m.timing}</div>` : ''}
                                ${m.warningText ? `<div class="instr-warning">${m.warningText}</div>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            }

            // صفوف فارغة لإكمال 9
            for (let i = 0; i < emptyCount; i++) {
                html += `
                    <div class="pdf-row">
                        <div class="pdf-cell cell-pill"></div>
                        <div class="pdf-cell cell-name"></div>
                        <div class="pdf-cell cell-dose"></div>
                        <div class="pdf-cell cell-instr"></div>
                    </div>
                `;
            }

            html += `</div>`; // نهاية pdf-tbody
            html += `</div>`; // نهاية pdf-table-wrap

            // --- توقيع الصيدلاني — فقط في آخر صفحة ---
            if (isLastPage) {
                html += `
                    <div class="pdf-footer">
                        <div class="pdf-sig-block">
                            <div class="pdf-sig-label">توقيع الصيدلاني السريري</div>
                            <div class="pdf-sig-line"></div>
                        </div>
                        <div class="pdf-watermark">Clinical Pharmacy Counseling Tool</div>
                    </div>
                `;
            }

            pageDiv.innerHTML = html;
            return pageDiv;
        }

        /** الدالة الرئيسية لتوليد ملف PDF */
        async function generatePDF(patientList) {
            if (patientList.length === 0) {
                showToast('لا يوجد مرضى محددين', 'error');
                return;
            }

            showToast('جاري إنشاء PDF...', 'info');
            const container = $('pdf-render-container');
            container.innerHTML = '';

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: 'p', unit: 'mm', format: 'a4' });

            // معالجة كل مريض
            for (let pi = 0; pi < patientList.length; pi++) {
                const p = patientList[pi];
                const meds = p.meds || [];
                const totalPages = Math.ceil(meds.length / ROWS_PER_PAGE);

                // معالجة كل صفحة من صفحات المريض
                for (let pg = 0; pg < totalPages; pg++) {
                    const start = pg * ROWS_PER_PAGE;
                    const pageMeds = meds.slice(start, start + ROWS_PER_PAGE);
                    const emptyCount = ROWS_PER_PAGE - pageMeds.length;
                    const isLastPage = (pg === totalPages - 1);

                    // إضافة "(تابع)" لاسم المريض في الصفحات المتابعة
                    const displayName = pg > 0 ? p.name + ' (تابع)' : p.name;

                    // بناء عنصر HTML للصفحة
                    const pageDiv = buildPDFPage(p, pageMeds, emptyCount, displayName, isLastPage);

                    container.appendChild(pageDiv);

                    // انتظار تحميل الخطوط
                    await document.fonts.ready;
                    await new Promise(r => setTimeout(r, 250));

                    // تحويل الصفحة إلى صورة
                    const canvas = await html2canvas(pageDiv, {
                        scale: 2.5,
                        useCORS: true,
                        logging: false,
                        backgroundColor: '#ffffff',
                        width: pageDiv.offsetWidth,
                        height: pageDiv.offsetHeight
                    });

                    // إضافة الصفحة لملف PDF
                    const imgData = canvas.toDataURL('image/jpeg', 0.98);
                    if (pi > 0 || pg > 0) doc.addPage();
                    doc.addImage(imgData, 'JPEG', 0, 0, 210, 297);

                    container.removeChild(pageDiv);
                }
            }

            // حفظ الملف باسم مناسب
            const filename = patientList.length === 1
                ? `Counseling_${patientList[0].name}_${patientList[0].room}.pdf`
                : `Counseling_Batch_${new Date().toISOString().split('T')[0]}.pdf`;
            doc.save(filename);
            showToast('تم إنشاء PDF بنجاح');
        }

        // =============================================
        // معالجات الأحداث العامة (للنقر من HTML)
        // =============================================
        window._toggleSelect = (id) => {
            if (selectedIds.has(id)) selectedIds.delete(id);
            else selectedIds.add(id);
            renderQueue();
        };

        window._deletePatient = (id) => deletePatient(id);

        window._printSingle = async (id) => {
            const p = patients.find(px => px.id === id);
            if (p) await generatePDF([p]);
        };

        // =============================================
        // ربط مستمعي الأحداث بعناصر الواجهة
        // =============================================

        // قوائم الأدوية
        $('selCategory').addEventListener('change', updateDrugDropdown);
        $('selDrug').addEventListener('change', onDrugSelected);
        $('inpCustomDrug').addEventListener('input', updatePreview);

        // حقول المعلمات
        $('selPills').addEventListener('change', updatePreview);
        $('selFreq').addEventListener('change', updatePreview);
        $('selTiming').addEventListener('change', updatePreview);
        $('selMethod').addEventListener('change', updatePreview);
        $('selWarning').addEventListener('change', updatePreview);
        $('inpDose').addEventListener('input', updatePreview);

        // أزرار الإضافة والحفظ
        $('btnAddMed').addEventListener('click', addMedication);
        $('btnClearMeds').addEventListener('click', () => {
            currentMeds = [];
            renderMedsList();
        });
        $('btnSave').addEventListener('click', savePatient);

        // طابور المرضى
        $('selAll').addEventListener('change', (e) => {
            if (e.target.checked) patients.forEach(p => selectedIds.add(p.id));
            else selectedIds.clear();
            renderQueue();
        });
        $('filterRoom').addEventListener('input', () => renderQueue());
        $('btnPDF').addEventListener('click', async () => {
            const sel = patients.filter(p => selectedIds.has(p.id));
            await generatePDF(sel);
        });
        $('btnClearQueue').addEventListener('click', () => {
            if (patients.length === 0) return;
            patients.forEach(p => {
                deleteDoc(doc(db, "counseling_patients", p.id)).catch(() => {});
            });
            selectedIds.clear();
            showToast('تم مسح الطابور', 'info');
        });

        // =============================================
        // تهيئة التطبيق عند التحميل
        // =============================================
        initDarkMode();
        updateDrugDropdown();
        startListener();
    </script>
</body>
</html>
